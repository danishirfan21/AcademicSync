services:
  postgres:
    image: postgres:16
    container_name: academicsync-postgres
    environment:
      POSTGRES_DB: academicsync
      POSTGRES_USER: academicsync
      POSTGRES_PASSWORD: academicsync
    ports:
      - "5435:5432"
    volumes:
      - academicsync_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academicsync -d academicsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  academicsync-api:
    build: .
    container_name: academicsync-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/academicsync
      SPRING_DATASOURCE_USERNAME: academicsync
      SPRING_DATASOURCE_PASSWORD: academicsync
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: academicsync
      SPRING_RABBITMQ_PASSWORD: academicsync
      ACADEMICSYNC_MESSAGING_ENABLED: true
    ports:
      - "8080:8080"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: academicsync-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: academicsync
      RABBITMQ_DEFAULT_PASS: academicsync

volumes:
  academicsync_postgres_data:
