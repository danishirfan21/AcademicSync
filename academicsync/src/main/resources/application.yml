spring:
  application:
    name: academicsync

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/academicsync}
    username: ${SPRING_DATASOURCE_USERNAME:academicsync}
    password: ${SPRING_DATASOURCE_PASSWORD:academicsync}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:academicsync}
    password: ${SPRING_RABBITMQ_PASSWORD:academicsync}

server:
  port: 8080

academicsync:
  messaging:
    enabled: ${ACADEMICSYNC_MESSAGING_ENABLED:false}
    exchange: academicsync.events
    sync-routing-key: academicsync.sync.completed
    failure-routing-key: academicsync.sync.failed
  scheduler:
    enabled: ${ACADEMICSYNC_SCHEDULER_ENABLED:true}
    cron: "0 */15 * * * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: academicsync
